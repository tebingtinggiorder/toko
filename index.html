<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
// Konfigurasi Firebase yang disamakan persis dengan Admin (Source 3)
const firebaseConfig = {
    apiKey: "AIzaSyAHFgI1sxXMxu9umSfCQMLB2j4C2zH87N8",
    authDomain: "tebingtinggiorder.firebaseapp.com",
    databaseURL: "https://tebingtinggiorder-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tebingtinggiorder",
    storageBucket: "tebingtinggiorder.firebasestorage.app",
    messagingSenderId: "374470707588",
    appId: "1:374470707588:web:d1fa72f4832753b401f5d1",
    measurementId: "G-BPKTES3HPY"
};

// Inisialisasi Firebase Aman dari Double Init
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

// Inisialisasi Database dan Storage
const database = firebase.database();
const storage = firebase.storage();

let seluruhProduk = [];
let kategoriTerpilih = "Semua";
let currentUser = null;
let produkDetailAktif = null;
let tipeOrderAktif = "Beli (Cash)";
let fotoAktifZoom = "";
let visitorSessionId = "visitor_" + Math.random().toString(36).substr(2, 9);
let promoTargetUrl = "";
let adminWaNumber = "6283182938600";

window.onload = function() {
  muatPengaturanToko();
  buatAnimasiFloating();
  catatPengunjungRealtime();
  cekSesiUserFast();
  dengarkanStatusMaintenance();
  muatKategori();
  dengarkanProdukRealtime();
};

// ==========================================
// SINKRONISASI PENGATURAN & SETTINGS ADMIN
// ==========================================
function muatPengaturanToko() {
  database.ref('settings').on('value', (snap) => {
    if(!snap.exists()) return;
    const s = snap.val();
    if(s.namaToko) {
      document.getElementById('headerShopName').innerText = "🎋 " + s.namaToko;
      document.getElementById('txtShopTitle').innerText = "🛍️ " + s.namaToko;
    }
    if(s.whatsapp) {
      adminWaNumber = s.whatsapp.replace(/[^0-9]/g, '');
      const waUrl = `https://wa.me/${adminWaNumber}?text=Halo%20Admin%20${encodeURIComponent(s.namaToko || 'Store')},%20saya%20ingin%20bertanya`;
      document.getElementById('floatingChatBeranda').href = waUrl;
      document.getElementById('btnFloatWaDetail').href = waUrl;
    }
  });
}

function catatPengunjungRealtime() {
  const refVisitor = database.ref('visitors/' + visitorSessionId);
  refVisitor.set({ lastActive: Date.now(), device: navigator.userAgent });
  refVisitor.onDisconnect().remove();
  setInterval(() => { refVisitor.update({ lastActive: Date.now() }); }, 10000);
}

function dengarkanStatusMaintenance() {
  database.ref('settings').on('value', (snap) => {
    let s = snap.val();
    let ov = document.getElementById('maintenanceOverlay');
    if(s && (s.maintenance === true || (s.maintenance && s.maintenance.status === true))) {
      if(s.maintenance.image) document.getElementById('imgMaintenance').src = s.maintenance.image;
      ov.style.display = 'flex';
    } else {
      ov.style.display = 'none';
    }
  });
}

// ==========================================
// KATEGORI & PRODUK REALTIME
// ==========================================
function muatKategori() {
  database.ref('kategori').on('value', (snap) => {
    let kats = snap.val() || {};
    let box = document.getElementById('kategoriScrollBox');
    let html = `<div class="category-tab ${kategoriTerpilih==='Semua'?'active':''}" onclick="pilihKategori('Semua')">Semua</div>`;
    Object.keys(kats).forEach(kId => {
      let val = (typeof kats[kId] === 'object') ? kats[kId].nama : kats[kId];
      if(val) {
        html += `<div class="category-tab ${kategoriTerpilih===val?'active':''}" onclick="pilihKategori('${val}')">${val}</div>`;
      }
    });
    box.innerHTML = html;
  });
}

function pilihKategori(kat) {
  kategoriTerpilih = kat;
  muatKategori();
  renderKatalog();
}

function dengarkanProdukRealtime() {
  database.ref('produk').on('value', (snap) => {
    let raw = snap.val() || {};
    seluruhProduk = [];
    Object.keys(raw).forEach(k => {
      let item = raw[k];
      item.id = k;
      // Hanya masukkan produk yang statusnya tidak false (aktif)[cite: 9]
      if(item.status !== false) {
        seluruhProduk.push(item);
      }
    });
    
    seluruhProduk.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    renderKatalog();
  });
}

function renderKatalog() {
  let kw = document.getElementById('kataKunciCari').value.toLowerCase();
  let lk = document.getElementById('lokasiCari').value.toLowerCase();
  let container = document.getElementById('katalogProduk');

  let filtered = seluruhProduk.filter(p => {
    let matchKat = (kategoriTerpilih === 'Semua' || (p.kategori && p.kategori.toLowerCase() === kategoriTerpilih.toLowerCase()));
    let matchKw = (p.nama && p.nama.toLowerCase().includes(kw));
    let matchLk = (!lk || (p.lokasi && p.lokasi.toLowerCase().includes(lk)));
    return matchKat && matchKw && matchLk;
  });

  if(filtered.length === 0) {
    container.innerHTML = "<p style='grid-column:span 2; text-align:center; color:var(--gray); padding:30px;'>Tidak ada produk ditemukan.</p>";
    return;
  }

  let htmls = filtered.map(p => {
    let fotoUtama = (p.listFoto && p.listFoto.length > 0) ? p.listFoto[0] : 'https://via.placeholder.com/200x140?text=MPT+Store';
    let badge = p.layanan || 'COD';
    let disableCreditClass = p.allowCredit === false ? 'disabled' : '';
    let creditOnClick = p.allowCredit === false ? '' : `event.stopPropagation(); bukaDetailProduk('${p.id}', 'Credit (Angsuran)')`;

    return `
      <div class="card-produk" onclick="bukaDetailProduk('${p.id}')">
        <div class="foto-wrapper">
          <img src="${fotoUtama}" alt="${p.nama}">
          <span class="badge-layanan">${badge}</span>
        </div>
        <div class="info-produk">
          <h3 class="nama-produk">${p.nama}</h3>
          <div class="harga">Rp ${Number(p.harga || 0).toLocaleString('id-ID')}</div>
          <div class="lokasi-daerah">📍 ${p.lokasi || 'Tebing Tinggi'}</div>
          <div class="btn-group-card">
            <button class="btn-card-buy" onclick="event.stopPropagation(); bukaDetailProduk('${p.id}', 'Beli (Cash)')">🛒 Beli</button>
            <button class="btn-card-credit ${disableCreditClass}" onclick="${creditOnClick}">💳 Credit</button>
          </div>
        </div>
      </div>
    `;
  });

  container.innerHTML = htmls.join('');
}

// ==========================================
// CHECKOUT & MANAJEMEN TRANSAKSI
// ==========================================
function prosesCheckout() {
  let qty = Number(document.getElementById('qtyOrder').value) || 1;
  let nama = document.getElementById('custNama').value.trim();
  let wa = document.getElementById('custWa').value.trim();
  let alamat = document.getElementById('custAlamat').value.trim();
  let catatan = document.getElementById('custCatatan').value.trim();

  if(!nama || !wa || !alamat) {
    showAlert("Nama, Nomor WhatsApp, dan Alamat wajib diisi!", "Perhatian", "⚠️");
    return;
  }

  let totalHarga = qty * Number(produkDetailAktif.harga || 0);
  let orderId = "ORD_" + Math.random().toString(36).substr(2, 6).toUpperCase();

  let orderData = {
    orderId: orderId,
    customerName: nama,
    customerWa: wa,
    alamat: alamat,
    catatan: catatan,
    total: totalHarga,
    status: "Pending",
    createdAt: Date.now(),
    waktu: new Date().toLocaleString('id-ID'),
    tipe: tipeOrderAktif,
    produkId: produkDetailAktif.id,
    namaProduk: produkDetailAktif.nama,
    hargaSatuan: produkDetailAktif.harga,
    qty: qty,
    userId: currentUser ? (currentUser.userId || currentUser.nama) : 'guest'
  };

  database.ref('orders/' + orderId).set(orderData, () => {
    tutupModalOrder();
    showAlert("Pesanan berhasil dikirim ke Admin toko! Silakan cek menu Akun untuk memantau status pesanan.", "Pesanan Sukses", "🚀");
    muatRiwayatPesananUser();
  });
}

function muatRiwayatPesananUser() {
  let box = document.getElementById('daftarPesananUser');
  if(!currentUser) return;
  let curId = currentUser.userId || currentUser.nama;

  database.ref('orders').orderByChild('userId').equalTo(curId).on('value', (snap) => {
    let orders = snap.val();
    if(!orders) {
      box.innerHTML = "<p style='color:var(--gray); font-size:13px;'>Belum ada riwayat pesanan.</p>";
      return;
    }
    let htmls = Object.keys(orders).map(k => {
      let o = orders[k];
      return `
        <div style="background:white; border:1px solid #e2e8f0; border-radius:12px; padding:15px; margin-bottom:10px;">
          <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px; color:var(--gray);">
            <span>ID: ${k}</span>
            <span>${o.waktu || ''}</span>
          </div>
          <h4 style="margin:0 0 6px 0; font-size:14px;">${o.namaProduk} (${o.tipe}) x${o.qty}</h4>
          <div style="font-weight:800; color:var(--primary); margin-bottom:8px;">Rp ${Number(o.total || 0).toLocaleString('id-ID')}</div>
          <div style="background:#f1f5f9; padding:8px 10px; border-radius:8px; font-size:12px; font-weight:700;">
            📍 Status Pesanan: <span style="color:var(--credit);">${o.status || 'Pending'}</span>
          </div>
        </div>
      `;
    });
    box.innerHTML = htmls.join('');
  });
}

// Fungsi bantu tambahan pendukung
function showAlert(pesan, judul = "Pemberitahuan", icon = "✨") {
  document.getElementById('modalAlertTitle').innerText = judul;
  document.getElementById('modalAlertText').innerText = pesan;
  document.getElementById('modalAlertIcon').innerText = icon;
  document.getElementById('modalAlertCenter').style.display = 'flex';
}
function tutupAlertCenter() { document.getElementById('modalAlertCenter').style.display = 'none'; }
function bukaHalaman(hal) {
  document.getElementById('halamanBeranda').style.display = 'none';
  document.getElementById('halamanDetailProduk').style.display = 'none';
  document.getElementById('halamanProfilUser').style.display = 'none';
  document.getElementById('floatingChatBeranda').style.display = 'none';

  if(hal === 'beranda') {
    document.getElementById('halamanBeranda').style.display = 'block';
    document.getElementById('floatingChatBeranda').style.display = 'flex';
  } else if(hal === 'detail') {
    document.getElementById('halamanDetailProduk').style.display = 'block';
  } else if(hal === 'profil') {
    document.getElementById('halamanProfilUser').style.display = 'block';
  }
  window.scrollTo(0, 0);
}
function cekSesiUserFast() {
  let userSaved = JSON.parse(localStorage.getItem('mpt_user_session'));
  if(userSaved) {
    currentUser = userSaved;
    document.getElementById('userAuthOverlay').style.display = 'none';
    document.getElementById('txtUserAktif').innerText = currentUser.userId || currentUser.nama;
    muatRiwayatPesananUser();
  } else {
    document.getElementById('userAuthOverlay').style.display = 'flex';
  }
}
function buatAnimasiFloating() {
  const box = document.getElementById('bgFloatBox');
  const icons = ['🛍️', '🛒', '📦', '🚚', '💳', '🎁', '⚡'];
  let items = [];
  for(let i = 0; i < 12; i++) {
    items.push(`
      <div class="bg-item" style="left:${Math.random() * 90}vw; animation-duration:${8 + Math.random() * 10}s; animation-delay:${Math.random() * 5}s;">
        ${icons[Math.floor(Math.random() * icons.length)]}
      </div>
    `);
  }
  box.innerHTML = items.join('');
}
function bukaDetailProduk(pId, initialTipe = null) {
  let p = seluruhProduk.find(x => x.id === pId);
  if(!p) return;
  produkDetailAktif = p;
  document.getElementById('detailNamaProduk').innerText = p.nama || '-';
  document.getElementById('detailHargaProduk').innerText = "Rp " + Number(p.harga || 0).toLocaleString('id-ID');
  document.getElementById('detailLokasiProduk').innerText = "📍 " + (p.lokasi || 'Tebing Tinggi');
  document.getElementById('detailBadgeLayanan').innerText = p.layanan || 'READY SIAP ANTAR';
  document.getElementById('detailDeskripsiProduk').innerText = p.deskripsi || 'Tidak ada deskripsi.';
  
  let listFoto = (p.listFoto && p.listFoto.length > 0) ? p.listFoto : ['https://via.placeholder.com/400x320?text=No+Image'];
  document.getElementById('imgMainDetail').src = listFoto[0];
  fotoAktifZoom = listFoto[0];
  bukaHalaman('detail');
  if(initialTipe) bukaModalOrder(initialTipe);
}
function bukaModalOrder(tipe) {
  tipeOrderAktif = tipe;
  document.getElementById('modalJudulTipe').innerText = `🛒 Form Pesanan: ${tipe}`;
  document.getElementById('qtyOrder').value = 1;
  if(currentUser) {
    document.getElementById('custNama').value = currentUser.nama || '';
    document.getElementById('custWa').value = currentUser.email || '';
  }
  hitungTotalOrder();
  document.getElementById('modalOrder').style.display = 'flex';
}
function tutupModalOrder() { document.getElementById('modalOrder').style.display = 'none'; }
function hitungTotalOrder() {
  let qty = Number(document.getElementById('qtyOrder').value) || 1;
  let hargaSatuan = produkDetailAktif ? Number(produkDetailAktif.harga || 0) : 0;
  document.getElementById('txtTotalHargaModal').innerText = "Rp " + (qty * hargaSatuan).toLocaleString('id-ID');
}
</script>
